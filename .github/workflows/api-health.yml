name: API Health

on:
  schedule:
    - cron: '17 */6 * * *' # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore status history
        run: |
          git fetch origin gh-pages --depth 1 2>/dev/null || true
          git show origin/gh-pages:history.json > history.json 2>/dev/null || echo '[]' > history.json

      - name: Run health check
        run: npx tsx scripts/health-check.ts --history history.json --out public

      - name: Publish status page
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const open = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: 'api-health',
            });
            if (open.data.length === 0) {
              await github.rest.issues.create({
                ...context.repo,
                title: 'API health check failed — Mercari API may have changed',
                labels: ['api-health'],
                body: `The scheduled health check against the live Mercari API failed.\n\n` +
                  `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n` +
                  `Status page: https://${context.repo.owner}.github.io/${context.repo.repo}/`,
              });
            }
