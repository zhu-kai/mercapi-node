name: API Health

on:
  schedule:
    - cron: '17 */6 * * *' # every 6 hours
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore status history
        run: curl -sfL https://zhu-kai.github.io/mercapi-node/history.json -o history.json || echo '[]' > history.json

      - name: Run health check
        run: npx tsx scripts/health-check.ts --history history.json --out public

      - name: Upload status page
        if: always()
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const open = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: 'api-health',
            });
            if (open.data.length === 0) {
              await github.rest.issues.create({
                ...context.repo,
                title: 'API health check failed — Mercari API may have changed',
                labels: ['api-health'],
                body: `The scheduled health check against the live Mercari API failed.\n\n` +
                  `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n` +
                  `Status page: https://${context.repo.owner}.github.io/${context.repo.repo}/`,
              });
            }
